    align-items: center;

    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    appearance: auto;

    border-color: rgba(255,255,255,0.7);

    color: #ffffff;
    font-weight: 600;

    background: #ffffff;
    border: 1.5px solid #c8d6e5;

// ====================== 建立映射表 ======================
const yuanwen = yuanwenRaw.split(/\s+/).filter(s => s.length > 0);
const romayin = romayinRaw.split(/\s+/).filter(s => s.length > 0);

// 辅助集合（用于判断连字符和 EU 追加）
const yuanyinSet = new Set('a o e Y L 6 2 T 8 3 V 1 i'.split(' ').filter(s=>s));
const weiyinSet  = new Set('n N 5 l v 4'.split(' ').filter(s=>s));
const euyinSet   = new Set('D s H'.split(' ').filter(s=>s));
const eu2Set     = new Set(['h','z','D','s','r','H']);

// 将 yuanwen 建立 Map（先填入，较短的会被较长的覆盖——但我们按长度从大到小查找）
// 直接按长度贪心匹配

function convertCaption(S) {
  const L = S.length;
  const src = S + '       ';
  let T = '';
  let X = 0;
  while (X < L) {
    let matched = false;
    for (let len = 5; len >= 1; len--) {
      const chunk = src.slice(X, X + len);
      const idx = yuanwen.indexOf(chunk);
      if (idx !== -1) {
        T += romayin[idx];
        X += len;
        // 判断是否加连字符
        const nextCh = src[X] || '';
        if (yuanyinSet.has(nextCh) || weiyinSet.has(nextCh)) T += '-';
        // 判断是否加 EU
        const prevCh = src[X - 1] || '';
        const nextCh2 = src[X] || '';
        if (euyinSet.has(prevCh) && eu2Set.has(nextCh2)) T += 'EU';
        matched = true;
        break;
      }
    }
    if (!matched) {
      T += src[X];
      X++;
    }
  }
  // 处理连字符：如果 '-' 前面的字符不是字母，则替换为空格
  let T2 = '';
  for (let i = 0; i < T.length; i++) {
    if (T[i] === '-' && (i === 0 || !/[a-zA-ZĀāĒēĪīŌōŪūĀĒĪŌŪ\u0100-\u017F]/.test(T[i-1]))) {
      T2 += ' ';
    } else {
      T2 += T[i];
    }
  }
  return T2;
}

function convertContents(caption) {
  // [Contents]: 句首和标点后大写，其余小写
  const send = new Set(['.', '?', '!', '\n']);
  let T3 = '';
  let w = 0;
  for (let ll = 0; ll < caption.length; ll++) {
    const ch = caption[ll];
    if (send.has(ch)) {
      w = 1;
      T3 += ch;
    } else if ((w === 1 && /[a-zA-Z\u00C0-\u024F]/.test(ch)) || ll === 0) {
      T3 += ch.toUpperCase();
      w = 0;
    } else {
      T3 += ch.toLowerCase();
    }
  }
  return T3;
}

function convertLyric(S) {
  const L = S.length;
  const src = S + '       ';
  let U = '';
  let Y = 0;
  let X = L; // X used in original eu2 check (final X value after caption loop = L effectively)
  while (Y < L) {
    let matched = false;
    for (let len = 5; len >= 1; len--) {
      const chunk = src.slice(Y, Y + len);
      const idx = yuanwen.indexOf(chunk);
      if (idx !== -1) {
        U += romayin[idx];
        Y += len;
        // EU check (original uses X which is at end of first loop = L, src[L] = ' ')
        const prevCh = src[Y - 1] || '';
        const nextCh = src[X] || '';
        if (euyinSet.has(prevCh) && eu2Set.has(nextCh)) U += 'EU';
        U += ' ';
        matched = true;
        break;
      }
    }
    if (!matched) {
      U += src[Y] + ' ';
      Y++;
    }
  }
  U += ' ';
  // Remove double spaces
  let Z = '';
  for (let k = 0; k < U.length - 1; k++) {
    if (!(U[k] === ' ' && U[k+1] === ' ')) {
      Z += U[k];
    }
  }
  return Z.toLowerCase();
}

// ====================== UI 逻辑 ======================
const inputEl  = document.getElementById('input');
const outputEl = document.getElementById('output');
const modeEl   = document.getElementById('mode');

function doConvert() {
  const S = inputEl.value;
  const mode = modeEl.value;
  if (!S.trim()) { outputEl.value = ''; return; }

  const caption = convertCaption(S);

  if (mode === 'caption') {
    outputEl.value = caption;
  } else if (mode === 'contents') {
    outputEl.value = convertContents(caption);
  } else {
    outputEl.value = convertLyric(S);
  }
}

inputEl.addEventListener('input', doConvert);
modeEl.addEventListener('change', doConvert);

let currentLang = 'zh-Hans';

function applyLang(lang) {
  const t = i18n[lang];
  if (!t) return;
  currentLang = lang;

  // HTML lang
  document.documentElement.lang = t.htmlLang;
  // 全局字体
  document.body.style.fontFamily = t.fontFamily;
  document.getElementById('mode').style.fontFamily = t.fontFamily;
  document.getElementById('input').style.fontFamily = t.fontFamily;
  // Page title
  document.title = t.pageTitle;
  // Header
  document.getElementById('app-title').textContent = t.appTitle;
  document.getElementById('app-subtitle').innerHTML = t.subtitle;
  // Labels & controls
  document.getElementById('label-input').textContent = t.labelInput;
  document.getElementById('input').placeholder = t.placeholder;
  document.getElementById('label-mode').textContent = t.labelMode;
  document.getElementById('opt-contents').textContent = t.optContents;
  document.getElementById('opt-caption').textContent = t.optCaption;
  document.getElementById('opt-lyric').textContent = t.optLyric;
  document.getElementById('label-output').textContent = t.labelOutput;
  document.getElementById('app-info').innerHTML = t.info;

  // Sync dropdown
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = lang;

  // Save preference
  try { localStorage.setItem('xdi8-ui-lang', lang); } catch(e) {}
}

// Bind language dropdown
document.getElementById('lang-select').addEventListener('change', function() {
  applyLang(this.value);
});

// Init: restore saved language or detect browser language
(function initLang() {
  let saved;
  try { saved = localStorage.getItem('xdi8-ui-lang'); } catch(e) {}
  if (saved && i18n[saved]) {
    applyLang(saved);
    return;
  }
  const bl = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (bl.startsWith('zh-hant') || bl === 'zh-tw' || bl === 'zh-hk' || bl === 'zh-mo') {
    applyLang('zh-Hant');
  } else if (bl.startsWith('zh')) {
    applyLang('zh-Hans');
  } else if (bl.startsWith('ja')) {
    applyLang('ja');
  } else if (bl.startsWith('ko')) {
    applyLang('ko');
  } else if (bl.startsWith('vi')) {
    applyLang('vi');
  } else if (bl.startsWith('ru')) {
    applyLang('ru');
  } else if (bl.startsWith('es')) {
    applyLang('es');
  } else if (bl.startsWith('fr')) {
    applyLang('fr');
  } else if (bl.startsWith('pt')) {
    applyLang('pt');
  } else {
    applyLang('en');
  }
})();
