                                result += 'EU ';
                            }
                            
                            index += len;
                            found = true;
                            break;
                        }
                    }
                }
                
                if (!found) {
                    result += text.charAt(index) + ' ';
                    index++;
                }
            }
            
            return result.trim();
        }

        function processInput(inputText) {
            const caption = convertToRoman(inputText);
            const contents = processContentsFormat(caption);
            const lyric = convertToLyric(inputText).toLowerCase();

            return { caption, contents, lyric };
        }

        function processContentsFormat(caption) {
            let result = '';
            let capitalizeNext = true;
            
            for (let i = 0; i < caption.length; i++) {
                const char = caption[i];
                
                if (char === '-' && (i === 0 || !/[A-Za-zĀĒĪŌŪ]/.test(caption[i-1]))) {
                    result += ' ';
                } else {
                    result += char;
                }
            }
            
            let finalResult = '';
            for (let i = 0; i < result.length; i++) {
                const char = result[i];
                
                if ('.!?'.includes(char)) {
                    capitalizeNext = true;
                    finalResult += char;
                } else if (capitalizeNext && /[A-Za-z]/.test(char) || i === 0) {
                    finalResult += char.toUpperCase();
                    capitalizeNext = false;
                } else {
                    finalResult += char.toLowerCase();
                }
            }
            
            return finalResult;
        }

        function updateOutput() {
            const inputText = document.getElementById('inputText').value;
            
            if (inputText.trim() === '') {
                document.getElementById('captionOutput').textContent = '';
                document.getElementById('contentsOutput').textContent = '';
                document.getElementById('lyricOutput').textContent = '';
                return;
            }
            
            const { caption, contents, lyric } = processInput(inputText);
            
            document.getElementById('captionOutput').textContent = caption;
            document.getElementById('contentsOutput').textContent = contents;
            document.getElementById('lyricOutput').textContent = lyric;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Set up tab switching
            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', function() {
                    const tabName = this.getAttribute('data-tab');
                    
                    // Update active tab button
                    document.querySelectorAll('.tab-button').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    // Update active tab content
                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.classList.remove('active');
                    });
                    document.getElementById(`${tabName}-content`).classList.add('active');
                    
                    // Update select dropdown
                    document.getElementById('outputFormat').value = tabName;
                });
            });
            
            // Set up select dropdown
            document.getElementById('outputFormat').addEventListener('change', function() {
                const selectedTab = this.value;
                
                // Update active tab button
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.classList.remove('active');
                });
                document.querySelector(`.tab-button[data-tab="${selectedTab}"]`).classList.add('active');
                
                // Update active tab content
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(`${selectedTab}-content`).classList.add('active');
            });
            
            // Set up input listener
            document.getElementById('inputText').addEventListener('input', updateOutput);
            
            // Initial output
            updateOutput();
        });

        // Swap button functionality
        document.querySelector('.swap-btn').addEventListener('click', function() {
            const inputTextarea = document.getElementById('inputText');
            const outputFormat = document.getElementById('outputFormat').value;
            
            // Get current output based on selected format
            let currentOutput = '';
            switch(outputFormat) {
                case 'caption':
                    currentOutput = document.getElementById('captionOutput').textContent;
                    break;
                case 'contents':
                    currentOutput = document.getElementById('contentsOutput').textContent;
                    break;
                case 'lyric':
                    currentOutput = document.getElementById('lyricOutput').textContent;
                    break;
            }
            
            // Swap input and output
            const temp = inputTextarea.value;
            inputTextarea.value = currentOutput;
            document.getElementById('captionOutput').textContent = temp;
            document.getElementById('contentsOutput').textContent = processContentsFormat(temp);
            document.getElementById('lyricOutput').textContent = convertToLyric(temp).toLowerCase();
        });
    </script>
</body>
</html>
